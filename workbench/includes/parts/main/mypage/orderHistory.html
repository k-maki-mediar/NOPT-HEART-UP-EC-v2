<section class="c-order-history" aria-labelledby="order-history-heading">
  <div class="c-order-history__inner">
    <h2 id="order-history-heading" class="u-sr-only">注文履歴</h2>
    <button type="button" class="c-order-history__header js-order-history-toggle" aria-expanded="true" aria-controls="js-order-history-body">
      <img src="../../../files/commonfiles/images/icon-order.png" alt="注文履歴アイコン" class="c-order-history__header-icon" />
      <span class="c-order-history__header-title">注文履歴</span>
      <span class="c-order-history__header-toggle" aria-hidden="true"></span>
    </button>
    <div class="c-order-history__body js-order-history-body is-open" id="js-order-history-body">
      <div class="c-order-history__product">
        <div class="c-order-history__product-info">
          <p class="c-order-history__product-info-text">最新購入日：2025/10/20</p>
          <p class="c-order-history__product-info-text">注文状況：新規受付</p>
        </div>
        <div class="c-order-history__product-img-wrap">
          <span class="c-order-history__product-label">最新購入商品</span>
          <img src="../../../files/commonfiles/images/product-sample.png" alt="2ウィークスメディアル" class="c-order-history__product-img" />
        </div>
        <p class="c-order-history__product-name">2ウィークスメディアル</p>
        <div class="c-order-history__product-actions">
          <a href="#" class="c-order-history__product-btn">
            <img src="../../../files/commonfiles/images/icon-search-navy.svg" alt="" class="c-order-history__product-btn-icon" />
            詳細
          </a>
          <a href="#" class="c-order-history__product-btn">
            <img src="../../../files/commonfiles/images/icon-cart-navy.svg" alt="" class="c-order-history__product-btn-icon" />
            もう一度買う
          </a>
        </div>
      </div>
      <div class="c-order-history__actions">
        <a href="#" class="c-order-history__btn">購入履歴をもっと見る</a>
      </div>
    </div>
  </div>
</section>
