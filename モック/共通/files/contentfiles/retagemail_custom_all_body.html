<th:block th:fragment="wsparts-include">
  <th:block th:if="${LoginInfoResultBean.customer}">
    <script th:inline="javascript">
      /*<![CDATA[*/

      var customer = /*[[${LoginInfoResultBean.customer}]]*/ "";

      var userCode = customer.customerCode || "";
      var email = customer.email || "";
      var lastName = customer.lastName || "";
      var firstName = customer.firstName || "";
      var gender = customer.sex || "";
      var point = customer.restPoint || "";
      var status = 1;
      var purchasedCount = customer.purchaseCount || "0";
      var customerType = customer.customerType || "";

      if (userCode) {
        _sna_dam.push(["userCode", userCode]);

        if (email) _sna_dam.push(["email", email]);
        if (lastName) _sna_dam.push(["lastName", lastName]);
        if (firstName) _sna_dam.push(["firstName", firstName]);
        _sna_dam.push(["status", status]);
        if (gender) _sna_dam.push(["gender", gender]);
        if (point) _sna_dam.push(["point", point]);
        if (customerType) _sna_dam.push(["customerType", customerType]);
        if (purchasedCount) _sna_dam.push(["purchasedCount", purchasedCount]);

      }
      /*]]>*/
    </script>
  </th:block>
</th:block>
